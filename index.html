<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ASM Master</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #18212f;
        --muted: #637083;
        --line: #d8dee8;
        --panel: #ffffff;
        --soft: #f4f7fb;
        --accent: #0f766e;
        --accent-dark: #115e59;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        background: #eef3f7;
      }

      main {
        width: min(1120px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 32px 0;
      }

      header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 18px;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 4vw, 3.8rem);
        line-height: 1;
        font-weight: 780;
      }

      .summary {
        margin: 0;
        color: var(--muted);
        font-size: 0.95rem;
        text-align: right;
      }

      .refresh-date {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 0.9rem;
        font-weight: 650;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: end;
        gap: 12px;
        margin-bottom: 14px;
      }

      .field {
        display: grid;
        flex: 1 1 148px;
        gap: 5px;
        position: relative;
      }

      .field-wide {
        flex-basis: 230px;
      }

      .field-label {
        color: var(--muted);
        font-size: 0.72rem;
        font-weight: 760;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      input,
      select {
        width: 100%;
        height: 44px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0 14px;
        color: var(--ink);
        background: var(--panel);
        font: inherit;
        outline: none;
      }

      select {
        appearance: none;
        background-image: linear-gradient(45deg, transparent 50%, var(--muted) 50%), linear-gradient(135deg, var(--muted) 50%, transparent 50%);
        background-position: calc(100% - 18px) 18px, calc(100% - 13px) 18px;
        background-size: 5px 5px, 5px 5px;
        background-repeat: no-repeat;
        padding-right: 32px;
      }

      input:focus,
      select:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.14);
      }

      .clear {
        display: inline-flex;
        flex: 0 0 auto;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--accent-dark);
        background: var(--panel);
        cursor: pointer;
        font: inherit;
        font-size: 0.92rem;
        text-decoration: none;
        white-space: nowrap;
      }

      .mode-row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin: -4px 0 14px;
      }

      .switch {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: var(--muted);
        font-size: 0.92rem;
        font-weight: 680;
      }

      .switch input {
        width: 44px;
        height: 24px;
        accent-color: var(--accent);
      }

      .list-shell {
        height: calc(100vh - 184px);
        min-height: 420px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        overflow: hidden;
        box-shadow: 0 18px 42px rgba(24, 33, 47, 0.08);
      }

      details.picker {
        margin: 0 0 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      details.picker summary {
        cursor: pointer;
        padding: 11px 14px;
        color: var(--accent-dark);
        font-weight: 720;
      }

      .picker-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding: 0 14px 10px;
      }

      .picker-actions button {
        min-height: 34px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0 12px;
        color: var(--accent-dark);
        background: #f8fafc;
        cursor: pointer;
        font: inherit;
        font-size: 0.84rem;
        font-weight: 720;
      }

      .check-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
        gap: 8px 12px;
        max-height: 220px;
        overflow: auto;
        padding: 0 14px 14px;
      }

      .check-item {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.88rem;
      }

      .check-item input {
        width: auto;
        height: auto;
      }

      .asm-list {
        height: 100%;
        overflow: auto;
      }

      table {
        table-layout: fixed;
        border-collapse: collapse;
        background: var(--panel);
      }

      thead {
        position: sticky;
        top: 0;
        z-index: 1;
        background: #e7edf5;
      }

      th,
      td {
        padding: 12px 14px;
        border-bottom: 1px solid var(--line);
        text-align: left;
        vertical-align: top;
      }

      th {
        color: #475569;
        font-size: 0.76rem;
        font-weight: 780;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      tbody tr:nth-child(even) {
        background: var(--soft);
      }

      td {
        font-size: 0.9rem;
        line-height: 1.42;
        overflow-wrap: anywhere;
      }

      .generic {
        margin: 0 0 6px;
        font-size: 1.08rem;
        font-weight: 720;
        line-height: 1.25;
      }

      .alt,
      .evidence {
        margin: 0;
        color: var(--muted);
        font-size: 0.82rem;
        line-height: 1.35;
      }

      .evidence {
        margin-top: 8px;
      }

      .trial-link {
        display: inline-block;
        margin: 0 8px 6px 0;
        color: var(--accent-dark);
        font-weight: 680;
        text-decoration: none;
      }

      .trial-link:hover {
        text-decoration: underline;
      }

      .rct-toggle {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 24px;
        height: 24px;
        margin-top: 4px;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--accent-dark);
        background: #fff;
        cursor: pointer;
        font: inherit;
        font-weight: 780;
      }

      .graph-panel {
        min-width: 980px;
        padding: 18px;
      }

      .chart {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        padding: 16px 16px 10px;
        margin-bottom: 22px;
      }

      .chart-head {
        display: flex;
        align-items: start;
        justify-content: space-between;
        gap: 16px;
      }

      .chart h2 {
        margin: 0;
        font-size: 1.08rem;
      }

      .chart-counts {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 6px;
      }

      .chart-pill {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 4px 9px;
        color: var(--muted);
        background: #f8fafc;
        font-size: 0.75rem;
        font-weight: 720;
        white-space: nowrap;
      }

      .chart-meta,
      .chart-filter-summary {
        color: var(--muted);
        font-size: 0.86rem;
        line-height: 1.35;
      }

      .chart-meta {
        margin: 5px 0 12px;
      }

      .chart-filter-summary {
        margin: -4px 0 12px;
        color: #334155;
        font-size: 0.82rem;
      }

      .chart-legend {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin: 0 0 10px;
        color: var(--muted);
        font-size: 0.78rem;
      }

      .legend-item {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .legend-swatch {
        width: 24px;
        height: 8px;
        border-radius: 999px;
        background: #0f766e;
      }

      .legend-track {
        background: #dbe3ee;
      }

      .chart-empty,
      .empty,
      .error {
        padding: 28px;
        color: var(--muted);
      }

      .error {
        color: #9f1239;
      }

      @media (max-width: 760px) {
        main {
          width: min(100vw - 20px, 1120px);
          padding: 20px 0;
        }

        .toolbar,
        header,
        .mode-row {
          display: block;
        }

        .summary {
          margin-top: 8px;
          text-align: left;
        }

        .clear,
        .field,
        select {
          margin-top: 10px;
          width: 100%;
          justify-content: center;
        }

        .list-shell {
          height: calc(100vh - 210px);
          min-height: 360px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>ASM Master</h1>
          <p class="refresh-date" id="refreshDate">Data was most recently refreshed on: Loading...</p>
        </div>
        <p class="summary" id="summary">Loading ASMs...</p>
      </header>

      <div class="toolbar" id="toolbar">
        <label class="field field-wide">
          <span class="field-label">Text Search</span>
          <input id="search" type="search" placeholder="Search any visible or source field" autocomplete="off">
        </label>
        <label class="field" id="symptomWordField">
          <span class="field-label">Symptom Word</span>
          <input id="symptomTextFilter" list="symptomSuggestions" type="search" placeholder="Type symptom" autocomplete="off">
          <datalist id="symptomSuggestions"></datalist>
        </label>
        <button class="clear" id="clearFilters" type="button">Clear</button>
      </div>

      <div class="mode-row">
        <label class="switch">
          <span>Text list</span>
          <input id="graphToggle" type="checkbox">
          <span>Graphical display</span>
        </label>
        <label class="switch">
          <input id="notSymptomFilter" type="checkbox">
          <span>NOT symptom word</span>
        </label>
      </div>

      <details class="picker">
        <summary>Manually include ASMs</summary>
        <div class="picker-actions">
          <button id="selectAllAsms" type="button">Select all</button>
          <button id="selectNoAsms" type="button">Select none</button>
        </div>
        <div class="check-grid" id="asmChecks"></div>
      </details>

      <details class="picker">
        <summary>Columns</summary>
        <div class="picker-actions">
          <button id="selectAllColumns" type="button">Select all</button>
          <button id="selectNoColumns" type="button">Select none</button>
        </div>
        <div class="check-grid" id="columnChecks"></div>
      </details>

      <section class="list-shell" aria-label="Scrollable anti-seizure medication list">
        <div class="asm-list" id="asmList"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
